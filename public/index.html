<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterChef Menu 👨‍🍳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="day-header">Loading...</h1>
            <p id="date-text" class="date-badge"></p>
        </header>

        <main class="menu-grid">
            <section class="menu-card">
                <div class="card-header">
                    <span class="emoji">🍳</span>
                    <h2>Breakfast</h2>
                </div>
                <p id="breakfast-text">—</p>
            </section>

            <section class="menu-card">
                <div class="card-header">
                    <span class="emoji">🍲</span>
                    <h2>Lunch</h2>
                </div>
                <p id="lunch-text">—</p>
            </section>

            <section class="menu-card">
                <div class="card-header">
                    <span class="emoji">🥗</span>
                    <h2>Dinner</h2>
                </div>
                <p id="dinner-text">—</p>
            </section>
        </main>

        <footer>
            <p>MasterChefInd Bot • Minimalist View</p>
        </footer>
    </div>

    <script>
        async function fetchMenu() {
            try {
                const res = await fetch('/api/today');
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('day-header').innerText = data.day.toUpperCase();
                    document.getElementById('date-text').innerText = data.date;
                    document.getElementById('breakfast-text').innerText = data.breakfast;
                    document.getElementById('lunch-text').innerText = data.lunch;
                    document.getElementById('dinner-text').innerText = data.dinner;
                } else {
                    document.getElementById('day-header').innerText = "No Menu Found";
                }
            } catch (err) {
                document.getElementById('day-header').innerText = "Error Loading Menu";
            }
        }
        fetchMenu();
    </script>
</body>
</html>
